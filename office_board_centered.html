<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structr Office Board (Centered Layout)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root {
      --bg-light: #ffffff;
      --text-dark: #0f172a;
      --accent-blue: #3b82f6;
      --accent-purple: #a855f7;
      --accent-value: #4f46e5;
      --grey-mid: #6b6b6b;
      --grey-dark: #2d2d2d;
      --logo-base: #1e293b;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: #e2e8f0; /* Preview background */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    /* The board container */
    .board {
      width: 1000px;
      height: 600px;
      background-color: var(--bg-light);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      box-sizing: border-box;
      text-align: center;
    }

    /* Top Brand Section */
    .top-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 1rem;
    }

    /* Logo Grid */
    .logo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      width: 80px;
      height: 80px;
    }

    .logo-grid span {
      border-radius: 4px;
      background-color: var(--logo-base);
    }

    .logo-grid span:nth-child(6), .logo-grid span:nth-child(8) { background-color: var(--grey-mid); }
    .logo-grid span:nth-child(9) { background-color: var(--grey-dark); }

    .domain {
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      transform: translateY(-6px);
    }

    .company-name {
      font-size: 3.5rem;
      font-weight: 600;
      letter-spacing: -1px;
      margin-bottom: 0.5rem;
    }

    .text-gradient {
      background: linear-gradient(90deg, #3b82f6, #a855f7, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Separator Line */
    .separator {
      width: 85%;
      height: 6px;
      background-color: var(--accent-blue);
      border: none;
      border-radius: 3px;
      margin: 0.5rem 0 1rem 0;
    }

    /* Details Section */
    .details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
    }

    .detail-line {
      font-size: 1.6rem;
    }

    .detail-line.address-line {
      font-size: 1.35rem;
      margin-top: 0.75rem;
    }

    .detail-line.small {
      font-size: 1.15rem;
      margin-top: 0.5rem;
    }

    .label {
      color: var(--text-dark);
      font-weight: 700;
    }

    .value {
      color: var(--accent-value);
      font-weight: 500;
    }

    .divider {
      color: #94a3b8;
      margin: 0 0.5rem;
      font-weight: 300;
    }

    /* Print styles */
    @media print {
      body {
        background-color: var(--bg-light);
        padding: 0;
        margin: 0;
      }
      .board {
        width: 100%;
        height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>

  <div class="board">
    
    <div class="top-brand">
      <div class="logo-grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="domain text-gradient">structr.in</div>
    </div>
    
    <div class="company-name text-gradient">Structr AI Private Limited</div>
    
    <hr class="separator">
    
    <div class="details">
      <div class="detail-line">
        <span class="label">GSTIN:</span> <span class="value">09ABTCS4491A1ZY</span> 
        <span class="divider">|</span>
        <span class="label">CIN:</span> <span class="value">U62011UW2026PTC251693</span>
      </div>
      
      <div class="detail-line address-line">
        <span class="label">Address:</span> <span class="value">105 New Gandhi Nagar, Ghaziabad, Uttar Pradesh, 201001</span> 
      </div>
      
      <div class="detail-line small">
        <span class="label">Contact:</span> <span class="value">+91 7530929292</span>
        <span class="divider">|</span>
        <span class="label">Email:</span> <span class="value">madhavbansal0302@gmail.com</span>
      </div>
    </div>

  </div>

</body>
</html>
