name: Sync Blogs from Sanity

on:
  # Triggered by Sanity webhook
  repository_dispatch:
    types: [sanity-blog-published]

  # Also allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Sync blogs.json from Sanity
        env:
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
        run: node snyc-blogs.js

      - name: Commit and push blogs.json
        run: |
          git config user.name "Structr Bot"
          git config user.email "bot@structr.in"
          git add blogs.json
          git diff --staged --quiet || git commit -m "sync: update blogs.json from Sanity"
          git push
