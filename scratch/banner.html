<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-dark: #0d1017;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1584px;
      height: 396px;
      overflow: hidden;
      background-color: var(--bg-dark);
      background-image: radial-gradient(circle at top right, rgba(50, 60, 100, 0.4), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(80, 50, 80, 0.3), transparent 50%);
      position: relative;
    }
    .glow-orb {
      position: absolute;
      top: 50%;
      right: 0%;
      transform: translateY(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, rgba(192, 132, 252, 0.1) 20%, rgba(251, 191, 36, 0.05) 50%, transparent 70%);
      z-index: 1;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="glow-orb"></div>
</body>
</html>
