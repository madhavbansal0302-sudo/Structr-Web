<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Structr Office Board Design (Light)</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root {
      --bg-light: #ffffff;
      --bg-panel: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --border-color: rgba(0, 0, 0, 0.1);
      --grey-mid: #6b6b6b;
      --grey-dark: #2d2d2d;
      --logo-base: #1e293b;
    }

    body {
      font-family: "Inter", sans-serif;
      background-color: #cbd5e1; /* Darker background to preview the white board */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    /* The board container */
    .board {
      width: 1000px;
      height: 600px;
      background-color: var(--bg-light);
      /* Subtle radial gradients to give it a premium feel */
      background-image: radial-gradient(circle at top right, rgba(96, 165, 250, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at bottom left, rgba(192, 132, 252, 0.08) 0%, transparent 40%);
      border-radius: 24px;
      border: 1px solid var(--border-color);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.1);
      padding: 5rem 6rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
      box-sizing: border-box;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 3rem;
    }

    /* Scaled up Logo Grid */
    .logo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }

    .logo-grid span {
      border-radius: 4px;
      background-color: var(--logo-base);
    }

    .logo-grid span:nth-child(6) { background-color: var(--grey-mid); }
    .logo-grid span:nth-child(8) { background-color: var(--grey-mid); }
    .logo-grid span:nth-child(9) { background-color: var(--text-primary); }

    .company-name {
      font-size: 4.5rem;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.1;
    }

    .text-gradient {
      background: linear-gradient(90deg, #3b82f6, #a855f7, #f59e0b); /* Slightly darker gradient for better contrast on white */
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 4rem;
      row-gap: 2.5rem;
      margin-top: 3rem;
    }

    .info-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label {
      color: var(--text-secondary);
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .value {
      font-size: 1.6rem;
      font-weight: 600;
      color: var(--text-primary);
    }
    
    .address-section {
      margin-top: auto;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .address-text {
      font-size: 1.5rem;
      color: var(--text-secondary);
      font-weight: 500;
      line-height: 1.4;
    }

    /* Print styles */
    @media print {
      body {
        background-color: var(--bg-light);
        padding: 0;
        margin: 0;
      }
      .board {
        width: 100%;
        height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 5rem;
      }
      /* Ensure background gradients print */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
    }
  </style>
</head>
<body>

  <div class="board">
    <div class="header">
      <div class="logo-grid">
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
        <span></span><span></span><span></span>
      </div>
      <div class="company-name text-gradient">Structr AI Pvt Ltd.</div>
    </div>

    <div class="details-grid">
      <div class="info-group">
        <span class="label">GSTIN</span>
        <span class="value">09ABTCS4491A1ZY</span>
      </div>
      <div class="info-group">
        <span class="label">CIN</span>
        <span class="value">U62011UW2026PTC251693</span>
      </div>
      <div class="info-group">
        <span class="label">Phone Number</span>
        <span class="value">+91 7530929292</span>
      </div>
      <div class="info-group">
        <span class="label">Email</span>
        <span class="value">madhavbansal0302@gmail.com</span>
      </div>
    </div>

    <div class="address-section">
      <span class="label">Registered Address</span>
      <span class="address-text">105 New Gandhi Nagar, Ghaziabad, Uttar Pradesh, 201001</span>
    </div>
  </div>

</body>
</html>
